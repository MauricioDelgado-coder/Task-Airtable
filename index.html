document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tline:none; }\ninput::placeholder,textarea::placeholder { color:var(--text5); }\n@keyframes slideUpSheet { from { transform:translateY(100%); } to { transform:translateY(0); } }\n@keyframes backdropFade { from { opacity:0; } to { opacity:1; } }\n@keyframes spin { to { transform:rotate(360deg); } }\n@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh; background:var(--bg); max-width:480px; margin:0 auto; position:relative;\">\n\n  <!-- HEADER -->\n  <header style=\"position:sticky; top:0; z-index:20; background:var(--header-bg); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid var(--border2); padding:18px 20px 0;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;\">\n      <div>\n        <h1 style=\"font-size:32px; font-weight:700; color:var(--text1); letter-spacing:-0.8px; line-height:1;\">Tasks<\u002Fh1>\n        <p style=\"font-size:13px; color:var(--text5); margin-top:2px; font-weight:400; letter-spacing:0.1px;\">{{ completedCount }} of {{ total }} completed<\u002Fp>\n      <\u002Fdiv>\n      <button onclick=\"{{ openSettings }}\" style=\"background:var(--gear-bg); border:1px solid var(--border); width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text4);\" style-active=\"background:var(--accent-subtle); color:var(--accent);\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 18 18\" fill=\"none\"><circle cx=\"9\" cy=\"9\" r=\"3\" stroke=\"currentColor\" stroke-width=\"1.6\"><\u002Fcircle><path d=\"M9 1v2M9 15v2M1 9h2M15 9h2M3.22 3.22l1.41 1.41M13.37 13.37l1.41 1.41M3.22 14.78l1.41-1.41M13.37 4.63l1.41-1.41\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n    <!-- Progress bar --> e-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fsc-if>\n        <span style=\"font-size:10px; font-weight:600; color:#7c5cfc; letter-spacing:0.3px; opacity:0.8;\">AI<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FILTER PILLS -->\n    <div style=\"display:flex; gap:8px; margin-bottom:16px;\">\n      <button onclick=\"{{ filterAll }}\" style=\"padding:8px 18px; border-radius:20px; border:1px solid {{ tabAllBorder }}; background:{{ tabAllBg }}; color:{{ tabAllColor }}; font-size:13px; font-weight:{{ tabAllWeight }}; cursor:pointer; transition:all 0.15s; font-family:inherit;\">All<\u002Fbutton>\n      <button onclick=\"{{ filterActive }}\" style=\"padding:8px 18px; border-radius:20px; border:1px solid {{ tabActiveBorder }}; background:{{ tabActiveBg }}; color:{{ tabActiveColor }}; font-size:13px; font-weight:{{ tabActiveWeight }}; cursor:pointer; transition:all 0.15s; font-family:inherit;\">Active<\u002Fbutton>\n      <button onclick=\"{{ filterCompleted }}\" style=\"padding:8px 18px; border-radius:20px; border:1px solid {{ tabDoneBorder }}; background:{{ tabDoneBg }}; color:{{ tabDoneColor }}; font-size:13px; font-weight:{{ tabDoneWeight }}; cursor:pointer; transition:all 0.15s; font-family:inherit;\">Done<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- ERROR BANNER -->\n    <sc-if value=\"{{ error }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:rgba(255,77,109,0.1); border:1px solid rgba(255,77,109,0.25); border-radius:12px; padding:12px 16px; margin-bottom:12px; display:flex; align-items:center; gap:10px;\">\n        <span style=\"font-size:15px;\">⚠<\u002Fspan>\n        <p style=\"font-size:13px; color:#ff4d6d; flex:1; line-height:1.4;\">{{ error }}<\u002Fp>\n        <button onclick=\"{{ dismissError }}\" style=\"background:none; border:none; font-size:12px; color:#ff4d6d; cursor:pointer; font-weight:600; white-space:nowrap;\">Dismiss<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- TASK LIST -->\n    <div style=\"display:flex; flex-direction:column; gap:8px;\">\n\n      <!-- Loading -->\n      <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"padding:56px 20px; text-align:center;\">\n          <div style=\"width:28px; height:28px; border:2.5px solid rgba(124,92,252,0.2); border-top-color:#7c5cfc; border-radius:50%; margin:0 auto 14px; animation:spin 0.7s linear infinite;\"><\u002Fdiv>\n          <p style=\"font-size:15px; color:var(--text5); font-weight:500;\">Loading tasks…<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ notLoading }}\" hint-placeholder-val=\"{{ false }}\">\n        <sc-for list=\"{{ enrichedTodos }}\" as=\"todo\" hint-placeholder-count=\"4\">\n          <div style=\"background:var(--surface); border:1px solid var(--border2); border-radius:14px; overflow:hidden; display:flex; animation:fadeIn 0.2s ease-out;\" style-active=\"background:#1a1a28;\">\n\n            <!-- Priority stripe -->\n            <div style=\"width:3px; min-width:3px; background:{{ todo.priorityColor }}; flex-shrink:0;\"><\u002Fdiv>\n\n            <div style=\"flex:1; display:flex; align-items:flex-start; padding:14px 12px 14px 14px; gap:12px; min-width:0;\">\n\n              <!-- Checkbox -->\n              <div onclick=\"{{ todo.onToggle }}\" style=\"width:26px; height:26px; min-width:26px; border-radius:50%; background:{{ todo.checkboxBg }}; border:2px solid {{ todo.checkboxBorder }}; display:flex; align-items:center; justify-content:center; cursor:pointer; margin-top:1px; transition:all 0.15s;\">\n                <sc-if value=\"{{ todo.completed }}\" hint-placeholder-val=\"{{ false }}\">\n                  <svg width=\"12\" height=\"9\" viewBox=\"0 0 13 10\" fill=\"none\"><path d=\"M1.5 5.5L5 9l6.5-8\" stroke=\"white\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n\n    <input value=\"{{ editForm.title }}\" onchange=\"{{ handleEditTitle }}\" placeholder=\"Task title\" style=\"width:100%; border:none; font-size:17px; color:var(--text1); background:transparent; font-weight:500;\">\n          <\u002Fdiv>\n          <div style=\"background:var(--surface3); border:1px solid var(--border); border-radius:14px; padding:14px 16px;\">\n            <textarea value=\"{{ editForm.notes }}\" onchange=\"{{ handleEditNotes }}\" placeholder=\"Notes (optional)\" rows=\"3\" style=\"width:100%; border:none; font-size:15px; color:var(--text3); background:transparent; resize:none; line-height:1.5;\"><\u002Ftextarea>\n          <\u002Fdiv>\n          <div style=\"background:var(--surface3); border:1px solid var(--border); border-radius:14px; overflow:hidden;\">\n            <div style=\"display:flex; align-items:center; padding:14px 16px; border-bottom:1px solid var(--border2); min-height:52px;\">\n              <span style=\"font-size:16px; color:var(--text3); flex:1;\">Priority<\u002Fspan>\n              <select value=\"{{ editForm.priority }}\" onchange=\"{{ handleEditPriority }}\" style=\"border:none; background:transparent; font-size:15px; color:#7c5cfc; cursor:pointer;\">\n                <option value=\"\">None<\u002Foption><option value=\"High\">High<\u002Foption><option value=\"Medium\">Medium<\u002Foption><option value=\"Low\">Low<\u002Foption>\n              <\u002Fselect>\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:center; padding:14px 16px; border-bottom:1px solid var(--border2); min-height:52px;\">\n              <span style=\"font-size:16px; color:var(--text3); flex:1;\">Source<\u002Fspan>\n              <select value=\"{{ editForm.source }}\" onchange=\"{{ handleEditSource }}\" style=\"border:none; background:transparent; font-size:15px; color:#7c5cfc; cursor:pointer;\">\n                <option value=\"\">None<\u002Foption><option value=\"Manual\">Manual<\u002Foption><option value=\"Outlook\">Outlook<\u002Foption><option value=\"Teams\">Teams<\u002Foption><option value=\"iMessage\">iMessage<\u002Foption><option value=\"Other\">Other<\u002Foption>\n              <\u002Fselect>\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:center; padding:14px 16px; border-bottom:1px solid var(--border2); min-height:52px;\">\n              <span style=\"font-size:16px; color:var(--text3); flex:1;\">Due Date<\u002Fspan>\n              <input type=\"date\" value=\"{{ editForm.dueDate }}\" onchange=\"{{ handleEditDueDate }}\" style=\"border:none; background:transparent; font-size:14px; color:#7c5cfc; cursor:pointer;\">\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:center; padding:14px 16px; min-height:52px;\">\n              <span style=\"font-size:16px; color:var(--text3); flex:1;\">Tags<\u002Fspan>\n              <input value=\"{{ editForm.tags }}\" onchange=\"{{ handleEditTags }}\" placeholder=\"finance, urgent…\" style=\"border:none; background:transparent; font-size:14px; color:#7c5cfc; text-align:right; max-width:180px;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  LS_KEY = 'task_airtable_config';\n\n  getConfig() {\n    try { return JSON.parse(localStorage.getItem(this.LS_KEY) || '{}'); } catch(e) { return {}; }\n  }\n\n  state = {\n    todos: [],\n    loading: false,\n    error: null,\n    filter: 'all',\n    showAddModal: false,\n    editTodoId: null,\n    addForm: { title:'', priority:'', source:'', dueDate:'', notes:'', tags:'' },\n    editForm: { title:'', priority:'', source:'', dueDate:'', notes:'', tags:'' },\n    showSettings: false,\n    settingsForm: { pat:'', baseId:'', tableName:'' },\n    configured: false,\n    searchQuery: '',\n    searchResults: null,\n    searchLoading: false,\n  };\n\n  // ── Airtable helpers ──────────────────────────────────────\n  atUrl(id) {\n    const {baseId, tableName} = this.getConfig();\n    const base = `https://api.airtable.com/v0/${baseId}/${encodeURIComponent(tableName)}`;\n    return id ? `${base}/${id}` : base;\n  }\n  atHeaders() {\n    const {pat} = this.getConfig();\n    return { 'Authorization': `Bearer ${pat}`, 'Content-Type': 'application/json' };\n  }\n  recordToTodo(r) {\n    const f = r.fields || {};\n    return {\n      id: r.id,\n      title: f.Title || '',\n      completed: f.Status === 'Done',\n      flagged: f.Priority === 'High',\n      priority: f.Priority || null,\n      dueDate: f['Due Date'] || null,\n      source: f.Source || null,\n      notes: f.Notes || null,\n      tags: f.Tags || null,\n      createdAt: r.createdTime,\n    };\n  }\n\n  // ── Lifecycle ─────────────────────────────────────────────\n  componentDidMount() {\n    this._onKey = (e) => {\n      if (e.key !== 'Escape') return;\n      this.setState(s => {\n        if (s.showAddModal) return { showAddModal:false, addForm:{title:'',priority:'',source:'',dueDate:'',notes:'',tags:''} };\n        if (s.editTodoId) return { editTodoId:null, editForm:{title:'',priority:'',source:'',dueDate:'',notes:'',tags:''} };\n        if (s.showSettings) return { showSettings:false };\n        return null;\n      });\n    };\n    document.addEventListener('keydown', this._onKey);\n    const cfg = this.getConfig();\n    if (cfg.pat && cfg.baseId && cfg.tableName) {\n      this.setState({ configured: true });\n      this.loadTodos();\n    } else {\n      const sf = { pat: cfg.pat||'', baseId: cfg.baseId||'', tableName: cfg.tableName||'To Do' };\n      this.setState({ showSettings: true, settingsForm: sf });\n    }\n  }\n  componentWillUnmount() { document.removeEventListener('keydown', this._onKey); }\n\n  async atFetch(url, opts={}) {\n    const res = await fetch(url, { ...opts, headers: this.atHeaders() });\n    const data = await res.json();\n    if (!res.ok) {\n      const msg = data?.error?.message || data?.error?.type || `HTTP ${res.status}`;\n      throw new Error(`Airtable: ${msg}`);\n    }\n    return data;\n  }\n\n  async loadTodos() {\n    this.setState({ loading: true, error: null });\n    try {\n      const data = await this.atFetch(this.atUrl());\n      const todos = (data.records || [])\n        .map(r => this.recordToTodo(r))\n        .sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));\n      this.setState({ todos, loading: false });\n    } catch(e) {\n      this.setState({ loading: false, error: e.message });\n    }\n  }\n\n  // ── Date helpers ─────────────────────────────────────────\n  toInputDate(s) { if (!s) return ''; const [m,d,y]=s.split('/'); return (m&&d&&y)?`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`:''; }\n  fromInputDate(s) { if (!s) return null; const [y,m,d]=s.split('-'); return (y&&m&&d)?`${m}/${d}/${y}`:null; }\n  isOverdue(dueDate) {\n    if (!dueDate) return false;\n    const [m,d,y]=dueDate.split('/');\n    const due=new Date(`${y}-${m}-${d}`);\n    const today=new Date(); today.setHours(0,0,0,0);\n    return !isNaN(due.getTime())&&due<today;\n  }\n\n  // ── CRUD ─────────────────────────────────────────────────\n  async toggleComplete(id) {\n    const todo = this.state.todos.find(t=>t.id===id);\n    if (!todo) return;\n    const completed = !todo.completed;\n    this.setState(s=>({todos:s.todos.map(t=>t.id===id?{...t,completed}:t)}));\n    try {\n      await this.atFetch(this.atUrl(id), { method:'PATCH', body: JSON.stringify({ fields: { Status: completed ? 'Done' : 'Open' } }) });\n    } catch(e) {\n      this.setState(s=>({todos:s.todos.map(t=>t.id===id?{...t,completed:!completed}:t), error: e.message}));\n    }\n  }\n\n  async toggleFlag(id) {\n    const todo = this.state.todos.find(t=>t.id===id);\n    if (!todo) return;\n    const flagged = !todo.flagged;\n    const priority = flagged ? 'High' : (todo.priority==='High' ? null : todo.priority);\n    this.setState(s=>({todos:s.todos.map(t=>t.id===id?{...t,flagged,priority}:t)}));\n    try {\n      await this.atFetch(this.atUrl(id), { method:'PATCH', body: JSON.stringify({ fields: { Priority: priority || '' } }) });\n    } catch(e) {\n      this.setState(s=>({todos:s.todos.map(t=>t.id===id?{...t,flagged:!flagged,priority:todo.priority}:t), error: e.message}));\n    }\n  }\n\n  async deleteTodo(id) {\n    this.setState(s=>({todos:s.todos.filter(t=>t.id!==id)}));\n    try {\n      await this.atFetch(this.atUrl(id), { method:'DELETE' });\n    } catch(e) {\n      this.setState({error: e.message});\n      this.loadTodos();\n    }\n  }\n\n  openEdit(id) {\n    const todo=this.state.todos.find(t=>t.id===id);\n    if(!todo) return;\n    this.setState({editTodoId:id, editForm:{title:todo.title||'',priority:todo.priority||'',source:todo.source||'',dueDate:this.toInputDate(todo.dueDate),notes:todo.notes||'',tags:todo.tags||''}});\n  }\n  closeEdit() { this.setState({editTodoId:null,editForm:{title:'',priority:'',source:'',dueDate:'',notes:'',tags:''}}); }\n\n  async saveEdit() {\n    const {editTodoId,editForm}=this.state;\n    if(!editTodoId||!editForm.title.trim()) return;\n    const dueDate = this.fromInputDate(editForm.dueDate);\n    const flagged = editForm.priority==='High';\n    // Optimistic\n    this.setState(s=>({\n      todos:s.todos.map(t=>t.id===editTodoId?{...t,title:editForm.title.trim(),priority:editForm.priority||null,source:editForm.source||null,dueDate,notes:editForm.notes.trim()||null,tags:editForm.tags.trim()||null,flagged}:t),\n      editTodoId:null, editForm:{title:'',priority:'',source:'',dueDate:'',notes:'',tags:''},\n    }));\n    try {\n      const fields = { Title: editForm.title.trim() };\n      if (editForm.priority)             fields['Priority']  = editForm.priority;\n      if (editForm.source)               fields['Source']    = editForm.source;\n      if (dueDate)                       fields['Due Date']  = dueDate;\n      if (editForm.notes.trim())         fields['Notes']     = editForm.notes.trim();\n      if (editForm.tags.trim())          fields['Tags']      = editForm.tags.trim();\n      await this.atFetch(this.atUrl(editTodoId), { method:'PATCH', body: JSON.stringify({ fields }) });\n    } catch(e) {\n      this.setState({error: e.message});\n      this.loadTodos();\n    }\n  }\n\n  handleSearchInput(query) {\n    this.setState({ searchQuery: query });\n    if (!query.trim()) {\n      this.setState({ searchResults: null, searchLoading: false });\n      clearTimeout(this._searchTimer);\n      return;\n    }\n    this.setState({ searchLoading: true });\n    clearTimeout(this._searchTimer);\n    this._searchTimer = setTimeout(() => this.runSearch(query), 600);\n  }\n\n  async runSearch(query) {\n    const { todos } = this.state;\n    if (!todos.length) { this.setState({ searchLoading: false, searchResults: [] }); return; }\n    const today = new Date().toISOString().split('T')[0];\n    const taskList = todos.map(t => ({\n      id: t.id,\n      title: t.title,\n      completed: t.completed,\n      priority: t.priority || 'none',\n      dueDate: t.dueDate || null,\n      source: t.source || null,\n      tags: t.tags || null,\n      notes: t.notes || null,\n    }));\n    try {\n      const prompt = `Today is ${today}. You are filtering a task list. Given the user's search query, return ONLY a JSON array of task IDs that match. Be liberal — if unsure, include it. Return [] if nothing matches.\n\nTasks:\n${JSON.stringify(taskList, null, 2)}\n\nQuery: \"${query}\"\n\nRespond with ONLY a raw JSON array of matching id strings, no explanation, no markdown. Example: [\"recABC\",\"recXYZ\"]`;\n\n      const raw = await window.claude.complete(prompt);\n      const match = raw.match(/\\[.*\\]/s);\n      const ids = match ? JSON.parse(match[0]) : [];\n      const results = todos.filter(t => ids.includes(t.id));\n      this.setState({ searchResults: results, searchLoading: false });\n    } catch(e) {\n      this.setState({ searchLoading: false, searchResults: null, error: 'Search failed: ' + e.message });\n    }\n  }\n\n  clearSearch() {\n    this.setState({ searchQuery: '', searchResults: null, searchLoading: false });\n    clearTimeout(this._searchTimer);\n  }\n\n  saveSettings() {\n    const {settingsForm} = this.state;\n    if (!settingsForm.pat.trim() || !settingsForm.baseId.trim() || !settingsForm.tableName.trim()) return;\n    localStorage.setItem(this.LS_KEY, JSON.stringify({\n      pat: settingsForm.pat.trim(),\n      baseId: settingsForm.baseId.trim(),\n      tableName: settingsForm.tableName.trim(),\n    }));\n    this.setState({ showSettings: false, configured: true });\n    this.loadTodos();\n  }\n\n  async submitAdd() {\n    const {addForm}=this.state;\n    if(!addForm.title.trim()) return;\n    this.setState({showAddModal:false, addForm:{title:'',priority:'',source:'',dueDate:'',notes:'',tags:''}});\n    try {\n      const fields = { Title: addForm.title.trim(), Status: 'Open' };\n      if (addForm.priority)              fields['Priority']  = addForm.priority;\n      if (addForm.source)                fields['Source']    = addForm.source;\n      if (this.fromInputDate(addForm.dueDate)) fields['Due Date'] = this.fromInputDate(addForm.dueDate);\n      if (addForm.notes.trim())          fields['Notes']     = addForm.notes.trim();\n      if (addForm.tags.trim())           fields['Tags']      = addForm.tags.trim();\n      const res = await this.atFetch(this.atUrl(), { method:'POST', body: JSON.stringify({ fields }) });\n      const newTodo = this.recordToTodo(res);\n      this.setState(s=>({ todos: [...s.todos, newTodo] }));\n    } catch(e) {\n      this.setState({ error: e.message });\n    }\n  }\n\n  renderVals() {\n    const {filter,showAddModal,editTodoId,addForm,editForm,todos,loading,error,searchQuery,searchResults,searchLoading}=this.state;\n    const total=todos.length;\n    const completedCount=todos.filter(t=>t.completed).length;\n    const activeCount=total-completedCount;\n    const progressWidth=total>0?Math.round((completedCount/total)*100)+'%':'0%';\n    const self=this;\n\n    const base = searchResults !== null ? searchResults : todos;\n    const filtered = base.filter(t=>filter==='active'?!t.completed:filter==='completed'?t.completed:true);\n    const priorityColor=(p)=>p==='High'?'#ff4d6d':p==='Medium'?'#f59e0b':p==='Low'?'#10b981':'rgba(255,255,255,0.06)';\n\n    const enrichedTodos=filtered.map(todo=>({\n      ...todo,\n      notCompleted:!todo.completed, notFlagged:!todo.flagged,\n      onToggle:()=>self.toggleComplete(todo.id),\n      onFlag:()=>self.toggleFlag(todo.id),\n      onEdit:()=>self.openEdit(todo.id),\n      onDelete:()=>self.deleteTodo(todo.id),\n      isHighPriority:todo.priority==='High',\n      isMediumPriority:todo.priority==='Medium',\n      isLowPriority:todo.priority==='Low',\n      priorityColor: priorityColor(todo.priority),\n      hasTags:!!(todo.tags&&todo.tags.trim()),\n      tagList:todo.tags?todo.tags.split(',').map(t=>t.trim()).filter(Boolean):[],\n      hasDueDate:!!todo.dueDate, dueDateDisplay:todo.dueDate||'',\n      isOverdue:self.isOverdue(todo.dueDate)&&!todo.completed,\n      notOverdue:!(self.isOverdue(todo.dueDate)&&!todo.completed),\n      hasSource:!!todo.source, hasNotes:!!todo.notes,\n      notesPreview:todo.notes?(todo.notes.length>80?todo.notes.slice(0,80)+'…':todo.notes):'',\n      checkboxBg:todo.completed?'var(--accent)':'transparent',\n      checkboxBorder:todo.completed?'var(--accent)':'var(--checkbox-border)',\n    }));\n\n    const pill=(name)=>({\n      bg:filter===name?'var(--accent)':'transparent',\n      color:filter===name?'white':'var(--text5)',\n      border:filter===name?'var(--accent)':'var(--border)',\n      weight:filter===name?'600':'400',\n    });\n    const all=pill('all'),actv=pill('active'),done=pill('completed');\n\n    return {\n      total, activeCount, completedCount, progressWidth,\n      loading, notLoading: !loading,\n      error, configured: self.state.configured,\n      dismissError: ()=>self.setState({error:null}),\n      searchQuery, searchLoading,\n      isSearching: searchResults !== null,\n      notSearchingOrLoading: searchResults === null && !searchLoading,\n      handleSearch: (e)=>self.handleSearchInput(e.target.value),\n      clearSearch: ()=>self.clearSearch(),\n      showSettings: self.state.showSettings,\n      openSettings: ()=>{ const c=self.getConfig(); self.setState({showSettings:true, settingsForm:{pat:c.pat||'',baseId:c.baseId||'',tableName:c.tableName||'To Do'}}); },\n      closeSettings: ()=>self.setState({showSettings:false}),\n      saveSettings: ()=>self.saveSettings(),\n      settingsForm: self.state.settingsForm,\n      handleSettingsPat: (e)=>self.setState(s=>({settingsForm:{...s.settingsForm,pat:e.target.value}})),\n      handleSettingsBase: (e)=>self.setState(s=>({settingsForm:{...s.settingsForm,baseId:e.target.value}})),\n      handleSettingsTable: (e)=>self.setState(s=>({settingsForm:{...s.settingsForm,tableName:e.target.value}})),\n      filterAll:()=>self.setState({filter:'all'}),\n      filterActive:()=>self.setState({filter:'active'}),\n      filterCompleted:()=>self.setState({filter:'completed'}),\n      tabAllBg:all.bg, tabAllColor:all.color, tabAllWeight:all.weight, tabAllBorder:all.border,\n      tabActiveBg:actv.bg, tabActiveColor:actv.color, tabActiveWeight:actv.weight, tabActiveBorder:actv.border,\n      tabDoneBg:done.bg, tabDoneColor:done.color, tabDoneWeight:done.weight, tabDoneBorder:done.border,\n      enrichedTodos, isEmpty:enrichedTodos.length===0,\n      showAddModal,\n      openAdd:()=>self.setState({showAddModal:true}),\n      closeAdd:()=>self.setState({showAddModal:false,addForm:{title:'',priority:'',source:'',dueDate:'',notes:'',tags:''}}),\n      submitAdd:()=>self.submitAdd(),\n      addForm,\n      handleAddTitle:(e)=>self.setState(s=>({addForm:{...s.addForm,title:e.target.value}})),\n      handleAddPriority:(e)=>self.setState(s=>({addForm:{...s.addForm,priority:e.target.value}})),\n      handleAddSource:(e)=>self.setState(s=>({addForm:{...s.addForm,source:e.target.value}})),\n      handleAddDueDate:(e)=>self.setState(s=>({addForm:{...s.addForm,dueDate:e.target.value}})),\n      handleAddNotes:(e)=>self.setState(s=>({addForm:{...s.addForm,notes:e.target.value}})),\n      handleAddTags:(e)=>self.setState(s=>({addForm:{...s.addForm,tags:e.target.value}})),\n      showEditModal:!!editTodoId,\n      closeEdit:()=>self.closeEdit(),\n      saveEdit:()=>self.saveEdit(),\n      editForm,\n      handleEditTitle:(e)=>self.setState(s=>({editForm:{...s.editForm,title:e.target.value}})),\n      handleEditPriority:(e)=>self.setState(s=>({editForm:{...s.editForm,priority:e.target.value}})),\n      handleEditSource:(e)=>self.setState(s=>({editForm:{...s.editForm,source:e.target.value}})),\n      handleEditDueDate:(e)=>self.setState(s=>({editForm:{...s.editForm,dueDate:e.target.value}})),\n      handleEditNotes:(e)=>self.setState(s=>({editForm:{...s.editForm,notes:e.target.value}})),\n      handleEditTags:(e)=>self.setState(s=>({editForm:{...s.editForm,tags:e.target.value}})),\n      stopPropagation:(e)=>e.stopPropagation(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
