openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: todos
    description: Todo operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /todos:
    get:
      operationId: listTodos
      tags: [todos]
      summary: List all todos
      description: Returns all todo items from Airtable
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by completion status
          schema:
            type: string
            enum: [all, active, completed]
      responses:
        "200":
          description: List of todos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Todo"
    post:
      operationId: createTodo
      tags: [todos]
      summary: Create a todo
      description: Creates a new todo item in Airtable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TodoInput"
      responses:
        "201":
          description: Created todo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Todo"
  /todos/stats:
    get:
      operationId: getTodoStats
      tags: [todos]
      summary: Get todo statistics
      description: Returns counts of total, active, and completed todos
      responses:
        "200":
          description: Todo statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoStats"
  /todos/{id}:
    get:
      operationId: getTodo
      tags: [todos]
      summary: Get a single todo
      description: Returns full detail of a single todo item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Todo detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Todo"
        "404":
          description: Not found
    patch:
      operationId: updateTodo
      tags: [todos]
      summary: Update a todo
      description: Updates a todo item in Airtable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TodoUpdate"
      responses:
        "200":
          description: Updated todo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Todo"
    delete:
      operationId: deleteTodo
      tags: [todos]
      summary: Delete a todo
      description: Deletes a todo item from Airtable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted successfully
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Todo:
      type: object
      required:
        - id
        - title
        - completed
        - createdAt
      properties:
        id:
          type: string
          description: Airtable record ID
        title:
          type: string
          description: Task title
        completed:
          type: boolean
          description: Whether the task is done (Status = Done)
        flagged:
          type: boolean
          description: Whether the task is flagged (Priority = High)
        priority:
          type: string
          nullable: true
          enum: [High, Medium, Low]
          description: Task priority
        dueDate:
          type: string
          nullable: true
          description: Due date in MM/DD/YYYY format
        source:
          type: string
          nullable: true
          description: Source (Manual, Outlook, Teams, iMessage, Other)
        notes:
          type: string
          nullable: true
          description: Free-form notes
        tags:
          type: string
          nullable: true
          description: Comma-separated tags
        attachmentSummary:
          type: string
          nullable: true
          description: AI-generated attachment summary
        createdAt:
          type: string
          description: ISO timestamp
    TodoInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          description: Task title
        priority:
          type: string
          nullable: true
          enum: [High, Medium, Low]
        source:
          type: string
          nullable: true
    TodoUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        completed:
          type: boolean
        flagged:
          type: boolean
          description: Setting to true sets Priority=High; false clears priority
        priority:
          type: string
          nullable: true
          enum: [High, Medium, Low]
        dueDate:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        tags:
          type: string
          nullable: true
    TodoStats:
      type: object
      required:
        - total
        - active
        - completed
      properties:
        total:
          type: integer
        active:
          type: integer
        completed:
          type: integer
